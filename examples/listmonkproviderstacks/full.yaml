apiVersion: crossplane.ops.com.ai/v1alpha1
kind: ListmonkProviderStack
metadata:
  name: listmonk
  namespace: default
spec:
  clusterName: my-cluster
  kubernetesProviderConfigRef:
    name: my-cluster
  providerConfigName: listmonk
  providerConfigNamespace: default
  secretName: listmonk-provider-creds
  secretNamespace: crossplane-system
  runtimeConfig:
    requestsCpu: 100m
    requestsMemory: 256Mi
  nodePool:
    enabled: true
